/* ============================================================
   CLOSEOUT PACKAGE — CCG
   Edit the CONFIG object in <script> to customize per-project.
   ============================================================ */

/* CCG Official Fonts via Adobe Typekit: Seasons (display), Neue Regrade (body) */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* CCG Official Brand — Green Scheme Dark Mode */
  --bg-primary: #0D1414;
  --bg-secondary: #222A2C;
  --bg-card: #1a2224;
  --bg-card-hover: #222A2C;
  --text-primary: #ffffff;
  --text-title: #EDE8DF;
  --text-secondary: #A07060;
  --text-muted: #6a8886;
  --accent: #8B614F;
  --accent-secondary: #A07060;
  --accent-hover: #9A6A58;
  --border-color: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.12);
  --shadow: 0 4px 32px rgba(0,0,0,0.5);
  --radius: 22px;
  --radius-sm: 14px;
  --font-display: 'the-seasons', Georgia, serif;
  --font-body: 'Helvetica Neue LT Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  font-weight: 300;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── NAV ── */
.nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 16px 40px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,20,20,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-color);
}

.nav-logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}
.nav-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.nav-center {
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
  padding: 0 24px;
}

@media (max-width: 768px) {
  .nav-center { display: none; }
  .hero-tag { display: inline-flex !important; }
}

.nav-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 16px;
}

.search-wrapper {
  position: relative;
}

.search-input {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 24px;
  padding: 9px 16px 9px 38px;
  height: auto;
  line-height: 1;
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  width: 200px;
  outline: none;
  transition: all 0.3s;
  font-family: var(--font-body);
  box-sizing: border-box;
  vertical-align: middle;
  -webkit-appearance: none;
}

.search-input:focus {
  width: 300px;
  border-color: rgba(255,255,255,0.25);
  background: var(--bg-card);
}

.search-input::placeholder { color: rgba(255,255,255,0.35); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.8);
  pointer-events: none;
}

.search-results {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  max-height: 400px;
  overflow-y: auto;
  display: none;
  z-index: 200;
}

.search-results.active { display: block; }

.search-result-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer;
  transition: background 0.2s;
}

.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-card-hover); }

.search-result-item .result-title {
  font-weight: 500;
  font-size: 14px;
  color: var(--text-primary);
}

.search-result-item .result-category {
  font-size: 12px;
  color: var(--accent);
  margin-top: 2px;
}

.search-no-results {
  padding: 20px 16px;
  text-align: center;
}
.search-no-results p {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 12px;
}
.search-no-results .search-contact-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 10px 22px;
  font-size: 13px;
  line-height: 1;
  font-family: var(--font-body);
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
  -webkit-appearance: none;
}
.search-no-results .search-contact-btn svg { display: block; }
.search-no-results .search-contact-btn:hover { opacity: 0.85; }

.theme-toggle {
  background: none;
  border: none;
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  font-size: 20px;
  padding: 4px;
}

/* ── MAIN LAYOUT ── */
.main {
  max-width: 1320px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ── TOP ROW: Hero + Care ── */
.top-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}

/* ── HERO ── */
.hero {
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 420px;
  border: 1px solid var(--border-color);
}

.hero-img-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 0;
}

/* Gradient: faint at top, stronger at bottom for text legibility */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(13,20,20,0.15) 0%, rgba(13,20,20,0.5) 55%, rgba(13,20,20,0.88) 100%);
  z-index: 1;
  pointer-events: none;
}

.hero-spacer {
  flex: 1;
  position: relative;
  z-index: 2;
}

.hero-text {
  padding: 20px 28px 28px;
  position: relative;
  z-index: 2;
}

.hero-tag {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 2;
  font-size: 11px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  background: rgba(13,20,20,0.62);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.13);
  padding: 8px 14px 8px 12px;
  border-radius: 99px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.hero-tag::before {
  content: '';
  flex-shrink: 0;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.9;
}

.hero h1 {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 10px;
  color: #EDE8DF;
}

.hero h1 em { font-style: italic; }

.hero p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
}

/* ── CARDS ── */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 32px;
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.card:hover {
  transform: scale(1.015);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}

.card .link-list {
  margin-top: auto;
  padding-top: 20px;
}

.card-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  color: var(--accent);
}

.card-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  line-height: 1.1;
  margin-bottom: 8px;
  color: var(--text-title);
}

.card-title em { font-style: italic; }

.card-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 20px;
  line-height: 1.5;
}

/* ── LINK ROWS ── */
.link-list { list-style: none; }

.link-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-top: 1px solid var(--border-color);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--text-primary);
}

.link-item:hover { color: var(--accent); }

.link-item .link-text {
  font-size: 14px;
  font-weight: 300;
}

.link-item .link-icon {
  font-size: 14px;
  color: var(--text-muted);
  transition: color 0.2s, transform 0.2s ease;
}
.link-item:hover .link-icon { transform: scale(1.25); }

.link-item:hover .link-icon { color: var(--accent); }

button.link-item {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-top: 1px solid var(--border-color);
  border-radius: 0;
  outline: none;
  font-family: var(--font-body);
  -webkit-appearance: none;
}

/* ── BOTTOM ROW ── */
.bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}

/* ── CONTACT CARD ── */
.contact-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  position: relative;
  min-height: 480px;
}

.contact-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70%;
  background: linear-gradient(to top, rgba(13,20,20,0.92) 20%, rgba(13,20,20,0.6) 50%, transparent 100%);
  z-index: 0;
  pointer-events: none;
}

.contact-photo-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.contact-spacer {
  flex: 1;
  min-height: 0;
  position: relative;
  z-index: 1;
}

.contact-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.contact-photo-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card-hover));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  color: var(--text-muted);
}

.contact-info-overlay {
  padding: 16px 20px 12px;
  position: relative;
  z-index: 1;
  background: transparent;
}

.contact-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #fff;
  margin-bottom: 6px;
}

.contact-status::before {
  content: '';
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
}

.contact-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  line-height: 1.1;
  color: var(--text-title);
}

.contact-name em {
  font-style: italic;
}

.contact-role {
  font-size: 13px;
  color: var(--accent);
}

.contact-actions {
  padding: 0 20px 20px;
  position: relative;
  z-index: 1;
  background: transparent;
}

.contact-action-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-top: 1px solid var(--border-color);
  cursor: pointer;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 300;
  background: none;
  border-left: none;
  border-right: none;
  border-bottom: none;
  width: 100%;
  font-family: var(--font-body);
  transition: color 0.2s;
  text-decoration: none;
}

.contact-action-btn:first-child { border-top: none; margin-top: 8px; }
.contact-action-btn:hover { color: var(--accent); }
.contact-action-btn:hover .link-icon { color: var(--accent); }

.contact-action-btn .link-icon {
  font-size: 14px;
  color: var(--text-muted);
  transition: color 0.2s;
}

/* ── SCROLL HINT ── */
.scroll-hint {
  text-align: center;
  margin-top: 32px;
  color: var(--text-muted);
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
}

.scroll-hint svg { opacity: 0.5; }

/* ── CONTACT MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 40px;
  max-width: 420px;
  width: 90%;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
}

.modal h2 {
  font-family: var(--font-display);
  font-size: 24px;
  margin-bottom: 4px;
}

.modal .modal-role {
  color: var(--accent);
  font-size: 14px;
  margin-bottom: 24px;
}

.modal-field {
  margin-bottom: 16px;
}

.modal-field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}

.modal-field span {
  font-size: 15px;
  color: var(--text-primary);
}

.modal-field a {
  color: var(--text-primary);
  text-decoration: none;
}

.modal-field a:hover { text-decoration: underline; }

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: var(--font-body);
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #ffffff;
}

.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.btn-secondary:hover { background: var(--bg-card-hover); }

/* ── EMAIL MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-panel {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border-color); width: 100%; max-width: 480px;
  overflow: hidden; box-shadow: var(--shadow);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border-color);
}
.modal-title { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--text-title); }
.modal-close {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  font-size: 22px; line-height: 1; padding: 0 2px;
}
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }
.email-field { display: flex; flex-direction: column; gap: 6px; }
.email-field label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-weight: 400; }
.email-field-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
.email-field-row span { font-size: 14px; color: var(--text-primary); word-break: break-all; }
.copy-btn {
  background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px;
  color: var(--text-secondary); font-size: 12px; padding: 4px 10px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0; font-family: var(--font-body);
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { color: #5a9e78; border-color: #5a9e78; }
.copy-btn-full { align-self: flex-start; margin-top: 4px; }
.email-body-area {
  background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 10px;
  color: var(--text-primary); font-family: var(--font-body); font-size: 13px;
  padding: 12px 14px; resize: none; height: 140px; width: 100%; font-weight: 300;
  line-height: 1.6;
}
.email-open-btn {
  display: block; text-align: center; padding: 12px;
  background: var(--accent); color: #fff; border-radius: var(--radius-sm);
  text-decoration: none; font-size: 14px; font-weight: 400;
  transition: background 0.2s;
}
.email-open-btn:hover { background: var(--accent-hover); }

/* ── VIDEO MODAL ── */
.video-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.video-modal-overlay.active { display: flex; }

.video-modal {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  width: 100%;
  max-width: 900px;
  position: relative;
  overflow: hidden;
}

.video-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-color);
}

.video-modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text-primary);
}

.video-modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
  transition: color 0.2s;
}

.video-modal-close:hover { color: var(--text-primary); }

.video-modal-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
}

.video-modal-player iframe,
.video-modal-player video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── IMAGE SECTION (for hero with no real image) ── */
.hero-placeholder {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1a2a28 0%, #162020 40%, #0D1414 100%);
  z-index: 0;
}

.hero-placeholder::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,20,20,0.92) 0%, rgba(13,20,20,0.3) 60%, rgba(13,20,20,0.1) 100%);
}

/* ── LIGHT MODE ── */
body.light {
  --bg-primary: #f5f8f8;
  --bg-secondary: #e8efef;
  --bg-card: #ffffff;
  --bg-card-hover: #edf3f3;
  --text-primary: #0D1414;
  --text-title: #1a2826;
  --text-secondary: #3a5b5a;
  --text-muted: #7a9e9c;

body.light .nav {
  background: rgba(245,248,248,0.92);
}

body.light .search-input { color: rgba(0,0,0,0.7); }
body.light .search-input::placeholder { color: rgba(0,0,0,0.35); }
body.light .search-input:focus { border-color: rgba(0,0,0,0.2); }
body.light .search-icon { color: rgba(0,0,0,0.45); }
body.light .theme-toggle { color: rgba(0,0,0,0.6); }
body.light .hero p,
body.light .hero-desc { color: rgba(0,0,0,0.55); }
body.light .card-desc { color: rgba(0,0,0,0.5); }

/* ── INTRO ANIMATION ── */
#intro-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 32px;
  pointer-events: none;
  transition: opacity 0.9s ease;
  box-sizing: border-box;
}
#intro-headline {
  font-family: var(--font-display);
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 500;
  color: #fff;
  text-align: center;
  line-height: 1.1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.1em;
}
.intro-line {
  display: block;
  white-space: nowrap;
}
.intro-line.italic-line { font-style: italic; }
#intro-sub {
  font-family: var(--font-body);
  font-size: clamp(15px, 1.6vw, 20px);
  color: rgba(255,255,255,0.4);
  font-weight: 300;
  text-align: center;
  max-width: min(600px, 80vw);
  line-height: 1.7;
  letter-spacing: 0.01em;
}
@keyframes wordFadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.w {
  display: inline-block;
  opacity: 0;
  animation: wordFadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}
.intro-hidden {
  opacity: 0 !important;
  transform: translateY(18px) !important;
  transition: none !important;
}

/* ── FULL-WIDTH ROW ── */
.full-row { width: 100%; }
.card-full { width: 100%; box-sizing: border-box; }
.link-list-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  margin-top: 4px;
}
.link-list-grid .link-item {
  border-top: 1px solid rgba(255,255,255,0.08);
  border-right: 1px solid rgba(255,255,255,0.08);
  border-bottom: none;
  padding: 16px 20px;
  margin: 0;
}
.link-list-grid .link-item:last-child { border-right: none; }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .bottom-row { grid-template-columns: 1fr 1fr; }
  .link-list-grid { grid-template-columns: 1fr 1fr; }
  .link-list-grid .link-item:nth-child(even) { border-right: none; }
  .link-list-grid .link-item:nth-child(odd) { border-right: 1px solid rgba(255,255,255,0.08); }
}

@media (max-width: 768px) {
  .nav { padding: 12px 20px; }
  .main { padding: 20px; }
  .top-row { grid-template-columns: 1fr; }
  .bottom-row { grid-template-columns: 1fr; }
  .hero h1 { font-size: 32px; }
  .search-input:focus { width: 200px; }
  .search-results { width: 300px; }
}

function getLinkIcon(type) {

function styledTitle(title) {
  if (title.includes('\n')) {
    const parts = title.split('\n');
    const last = parts.pop();
    return parts.join('<br>') + '<br><em>' + last + '</em>';
  }
  const words = title.split(' ');
  if (words.length <= 1) return title;
  const last = words.pop();
  return words.join(' ') + ' <em>' + last + '</em>';
}

  return `

      <div class="hero-spacer"></div>
      <div class="hero-text">
        <h1>${styledTitle(CONFIG.heroTitle)}</h1>
        <p>${CONFIG.heroDescription}</p>
      </div>
    </div>`;
}

function buildLinkCard(section, fullWidth = false) {
  const iconHtml = ICONS[section.icon] || '';
  const descHtml = section.description ? `<p class="card-desc">${section.description}</p>` : '';

  const linksHtml = section.links.map(link => {
    if (link.type === 'video') {
      return `<button class="link-item" onclick="openVideoModal('${link.text.replace(/'/g,"\\'")}','${link.url}')" data-searchable>
        <span class="link-text">${link.text}</span>
        <span class="link-icon">${getLinkIcon('videoLink')}</span>
      </button>`;
    }
    if (link.type === 'emailModal') {
      const idx = EMAIL_MODALS.length;
      EMAIL_MODALS.push(link);
      return `<button class="link-item" onclick="handleEmailButton(${idx})" data-searchable>
        <span class="link-text">${link.text}</span>
        <span class="link-icon">${getLinkIcon('email')}</span>
      </button>`;
    }
    return `<a class="link-item" href="${link.url}" target="_blank" rel="noopener" data-searchable>
      <span class="link-text">${link.text}</span>
      <span class="link-icon">${getLinkIcon(link.type)}</span>
    </a>`;
  }).join('');

  const headerHtml = fullWidth ? `
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
        <div class="card-icon" style="margin-bottom:0;flex-shrink:0;">${iconHtml}</div>
        <div>
          <h2 class="card-title" style="margin-bottom:4px;">${styledTitle(section.title)}</h2>
          ${descHtml}
        </div>
      </div>` : `
      <div class="card-icon">${iconHtml}</div>
      <h2 class="card-title">${styledTitle(section.title)}</h2>
      ${descHtml}`;

  return `
    <div class="card${fullWidth ? ' card-full' : ''}">
      ${headerHtml}
      <div class="link-list${fullWidth ? ' link-list-grid' : ''}">${linksHtml}</div>
    </div>`;
}

function styledContactName(name) {
  const parts = name.trim().split(' ');
  if (parts.length < 2) return name;
  const last = parts.pop();
  return parts.join(' ') + ' <em>' + last + '</em>';
}

  return `
    <div class="card" style="padding:0;overflow:hidden;position:relative;min-height:260px;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border-color);">
      <div style="position:absolute;inset:0;${section.image ? `background:url('${section.image}') center/cover no-repeat` : `background:linear-gradient(135deg,#221e16,#1a1610)`};"></div>
      <div style="position:absolute;inset:0;background:rgba(10,16,16,0.55);"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(10,16,16,0.45) 0%, transparent 40%, rgba(10,16,16,0.6) 100%);"></div>
      <div style="position:relative;z-index:1;padding:32px 32px 0;flex:1;">
        <div class="card-icon" style="margin-bottom:16px;">${ICONS.download}</div>
        <h2 class="card-title">${styledTitle(section.title)}</h2>
      </div>
      <div style="position:relative;z-index:1;padding:0 32px 32px;">
        <div style="border-top:1px solid rgba(255,255,255,0.12);margin-bottom:0;"></div>
        <a class="link-item" href="${section.downloadUrl}" target="_blank" style="padding:14px 0;">
          <span class="link-text">${section.downloadText}</span>
          <span class="link-icon">${ICONS.external}</span>
        </a>
      </div>
    </div>`;
}

function render() {
  const main = document.getElementById('mainContent');
  const topRightSections = CONFIG.sections.filter(s => s.position === 'top-right');
  const bottomSections = CONFIG.sections.filter(s => s.position === 'bottom');
  const fullSections = CONFIG.sections.filter(s => s.position === 'full');

  let html = '';

  // Top row: Hero + top-right card
  html += '<div class="top-row">';
  html += buildHero();
  if (topRightSections.length > 0) {
    html += topRightSections.map(s => {
      if (s.type === 'links') return buildLinkCard(s);
      return '';
    }).join('');
  }
  html += '</div>';

  // Bottom row
  html += '<div class="bottom-row">';
  bottomSections.forEach(s => {
    if (s.type === 'contact') html += buildContactCard();
    else if (s.type === 'links') html += buildLinkCard(s);
    else if (s.type === 'image') html += buildImageCard(s);
  });
  html += '</div>';

  // Full-width row
  fullSections.forEach(s => {
    html += '<div class="full-row">';
    if (s.type === 'links') html += buildLinkCard(s, true);
    html += '</div>';
  });

  main.innerHTML = html;
}


// ╔════════════════════════════════════════════════════════════╗
// ║  SEARCH ENGINE                                            ║
// ╚════════════════════════════════════════════════════════════╝

function buildSearchIndex() {
  const index = [];

  CONFIG.sections.forEach(section => {
    if (section.links) {
      section.links.forEach(link => {
        index.push({
          title: link.text,
          category: section.title,
          url: link.url,
          type: link.type,
          keywords: link.text.toLowerCase(),
        });
      });
    }

    if (section.type === 'image' && section.downloadUrl) {
      index.push({
        title: section.downloadText || section.title,
        category: section.title,
        url: section.downloadUrl,
        type: 'external',
        keywords: (section.title + ' ' + (section.downloadText || '')).toLowerCase(),
      });
    }
  });

  // Add contact to search
  const c = CONFIG.contact;
  index.push({
    title: `${c.name} — ${c.role}`,
    category: 'Contact',
    url: '#contact',
    type: 'contact',
    keywords: `${c.name} ${c.role} ${c.email} ${c.company} contact`.toLowerCase(),
  });

  // Add project name
  index.push({
    title: CONFIG.projectName,
    category: 'Project',
    url: '#top',
    type: 'internal',
    keywords: CONFIG.projectName.toLowerCase(),
  });

  return index;
}

let searchIndex = [];

function initSearch() {
  searchIndex = buildSearchIndex();
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', (e) => {
    const query = e.target.value.trim().toLowerCase();

    if (!query) {
      results.classList.remove('active');
      return;
    }

    // Split query into words for fuzzy matching
    const words = query.split(/\s+/);
    const matches = searchIndex.filter(item => {
      return words.every(word => item.keywords.includes(word));
    });

    if (matches.length === 0) {
      // Try partial / fuzzy matching
      const fuzzyMatches = searchIndex.filter(item => {
        return words.some(word => item.keywords.includes(word));
      });

      if (fuzzyMatches.length > 0) {
        showResults(fuzzyMatches);
      } else {
        const c = CONFIG.contact;
        const searchTerm = e.target.value.trim();
        const fallbackBody = `Hi ${c.name.split(' ')[0]},\n\nI was looking for information about "${searchTerm}" and couldn't find it.\n\nCould you help me find what I need?\n\nThank you,`;
        // Push/update the fallback modal entry BEFORE rendering the button
        const lastEntry = EMAIL_MODALS[EMAIL_MODALS.length - 1];
        if (lastEntry && lastEntry._searchFallback) {
          lastEntry.body = fallbackBody;
        } else {
          EMAIL_MODALS.push({ _searchFallback: true, email: c.email, subject: 'Question — Sorenson Center for Medical Innovation', body: fallbackBody, text: `Contact ${c.name.split(' ')[0]}` });
        }
        const btnIdx = EMAIL_MODALS.length - 1;
        results.innerHTML = `<div class="search-no-results">
          <p>Don't see what you're looking for? We're happy to help you find whatever you need.</p>
          <button class="search-contact-btn" onclick="handleEmailButton(${btnIdx})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Reach out to ${c.name.split(' ')[0]}
          </button>
        </div>`;
        results.classList.add('active');
      }
    } else {
      showResults(matches);
    }
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) input.dispatchEvent(new Event('input'));
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) {
      results.classList.remove('active');
    }
  });
}

function showResults(matches) {
  const results = document.getElementById('searchResults');

  results.innerHTML = matches.map(m => `
    <div class="search-result-item" onclick="handleSearchClick('${m.url}', '${m.type}')">
      <div class="result-title">${m.title}</div>
      <div class="result-category">${m.category}</div>
    </div>`).join('');

  results.classList.add('active');
}

function handleSearchClick(url, type) {
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value = '';

  if (type === 'contact') {
    openContactModal();
  } else if (url.startsWith('#')) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (url.startsWith('mailto:')) {
    window.location.href = url;
  } else {
    window.open(url, '_blank');
  }
}


// ╔════════════════════════════════════════════════════════════╗
// ║  CONTACT MODAL & vCARD                                    ║
// ╚════════════════════════════════════════════════════════════╝

function openContactModal() {
  const c = CONFIG.contact;
  document.getElementById('modalName').textContent = c.name;
  document.getElementById('modalRole').textContent = c.role;

  const fields = [
    { label: 'Email', value: `<a href="mailto:${c.email}">${c.email}</a>` },
    { label: 'Phone', value: `<a href="tel:${c.phone}">${c.phone}</a>` },
    { label: 'Company', value: c.company },
  ];
  if (c.website) {
    fields.push({ label: 'Website', value: `<a href="${c.website}" target="_blank">${c.website.replace(/^https?:\/\//, '')}</a>` });
  }

  document.getElementById('modalFields').innerHTML = fields.map(f => `
    <div class="modal-field">
      <label>${f.label}</label>
      <span>${f.value}</span>
    </div>`).join('');

  document.getElementById('contactModal').classList.add('active');
}

function closeContactModal() {
  document.getElementById('contactModal').classList.remove('active');
}

function downloadVCard() {
  const c = CONFIG.contact;
  const names = c.name.split(' ');
  const lastName = names.pop();
  const firstName = names.join(' ');

  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `FN:${c.name}`,
    `N:${lastName};${firstName};;;`,
    `ORG:${c.company}`,
    `TITLE:${c.role}`,
    `EMAIL;TYPE=WORK:${c.email}`,
    `TEL;TYPE=WORK:${c.phone}`,
    c.website ? `URL:${c.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${c.name.replace(/\s+/g, '_')}.vcf`;
  a.click();
  URL.revokeObjectURL(url);
  closeContactModal();
}

// Close modal on overlay click
document.getElementById('contactModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeContactModal();
});

// Close modal on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeContactModal(); closeVideoModal(); }
});

// ── Email Modal ──────────────────────────────────────────────
const EMAIL_MODALS = [];

function handleEmailButton(idx) {
  const m = EMAIL_MODALS[idx];
  const mailtoUrl = `mailto:${m.email}?subject=${encodeURIComponent(m.subject)}&body=${encodeURIComponent(m.body)}`;
  window.location.href = mailtoUrl;
  // If the mail client opens, focus leaves the page — we do nothing.
  // If nothing opens (no handler configured), focus stays — show the fallback modal.
  setTimeout(() => {
    if (document.hasFocus()) showEmailModal(idx);
  }, 1500);
}

function showEmailModal(idx) {
  const m = EMAIL_MODALS[idx];
  const subject = encodeURIComponent(m.subject);
  const body = encodeURIComponent(m.body);
  document.getElementById('emailModalTitle').textContent = m.text;
  document.getElementById('emailTo').textContent = m.email;
  document.getElementById('emailSubject').textContent = m.subject;
  document.getElementById('emailBody').value = m.body;
  document.getElementById('emailMailtoLink').href = `mailto:${m.email}?subject=${subject}&body=${body}`;
  document.getElementById('emailModal').classList.add('active');
}

function closeEmailModal() {
  document.getElementById('emailModal').classList.remove('active');
}

function copyField(id, btn) {
  const el = document.getElementById(id);
  const text = el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Video Modal ──────────────────────────────────────────────
function openVideoModal(title, url) {
  document.getElementById('videoModalTitle').textContent = title;

  let playerHtml;
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/);
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);

  if (ytMatch) {
    playerHtml = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&rel=0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  } else if (vimeoMatch) {
    playerHtml = `<iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  } else if (/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url)) {
    // Direct video file (e.g. Supabase hosted MP4)
    playerHtml = `<video src="${url}" controls autoplay playsinline style="background:#000;"></video>`;
  } else {
    playerHtml = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  }

  document.getElementById('videoModalPlayer').innerHTML = playerHtml;
  document.getElementById('videoModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('active');
  document.getElementById('videoModalPlayer').innerHTML = '';  // stops playback
  document.body.style.overflow = '';
}

document.getElementById('videoModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeVideoModal();
});

// ── Theme Toggle ────────────────────────────────────
const themeToggle = document.getElementById('themeToggle');

function setTheme(light) {
  document.body.classList.toggle('light', light);
  themeToggle.textContent = light ? '☾' : '☀';
  localStorage.setItem('ccg-theme', light ? 'light' : 'dark');
  document.querySelector('meta[name="theme-color"]').content = light ? '#f5f8f8' : '#0D1414';
}

themeToggle.addEventListener('click', () => {
  setTheme(!document.body.classList.contains('light'));
});

// Default: dark mode. Only switch to light if user explicitly chose it.
setTheme(localStorage.getItem('ccg-theme') === 'light');

document.title = `${CONFIG.projectName} — Closeout Package`;

// ── Intro word-by-word animation ──
render();
initSearch();

const introScreen = document.getElementById('intro-screen');
const introLine1  = document.getElementById('intro-line1');
const introLine2  = document.getElementById('intro-line2');
const introSub    = document.getElementById('intro-sub');

// Hide all content cards immediately
const animTargets = document.querySelectorAll('.card, .contact-card, .hero');
animTargets.forEach(el => el.classList.add('intro-hidden'));

// Build word spans with staggered animation-delay
function buildWordSpans(words, startDelaySec, staggerSec) {
  return words.map((word, i) =>
    `<span class="w" style="animation-delay:${(startDelaySec + i * staggerSec).toFixed(2)}s">${word}</span>`
  ).join(' ');
}

const WORD_DUR    = 0.7;   // animation duration per word
const STAGGER     = 0.13;  // delay between words
const LINE_GAP    = 0.25;  // extra pause before line 2

const line1Words  = ['Welcome', 'to', 'Your'];
const line2Words  = ['Closeout', 'Package'];
const subWords    = "Here you'll find everything you need for your new space — care guides, warranty information, product documentation, and a direct line to your team.".split(' ');

const line1End    = line1Words.length * STAGGER + WORD_DUR;
const line2Start  = line1End - WORD_DUR + LINE_GAP;
const line2End    = line2Start + line2Words.length * STAGGER + WORD_DUR;
const subStart    = line2End - WORD_DUR + 0.3;
const subEnd      = subStart + subWords.length * 0.038 + WORD_DUR;

introLine1.innerHTML = buildWordSpans(line1Words, 0.3, STAGGER);
introLine2.innerHTML = buildWordSpans(line2Words, 0.3 + line2Start, STAGGER);
introSub.innerHTML   = buildWordSpans(subWords,   0.3 + subStart, 0.038);

// After all words in, pause then dissipate
const totalAnimTime = (0.3 + subEnd) * 1000;
const PAUSE = 1400;

setTimeout(() => {
  // Dissipate text upward
  const dissipate = (el, blur, dy) => {
    el.style.transition = `opacity 1s ease, filter 1s ease, transform 1s ease`;
    el.style.opacity   = '0';
    el.style.filter    = `blur(${blur}px)`;
    el.style.transform = `translateY(${dy}px)`;
  };
  dissipate(introLine1, 8, -14);
  dissipate(introLine2, 8, -10);
  dissipate(introSub,   4, -6);

  // Fade out screen, scroll to top, stagger cards
  setTimeout(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
    introScreen.style.opacity = '0';
    setTimeout(() => { introScreen.remove(); }, 900);

    animTargets.forEach((el, i) => {
      setTimeout(() => {
        el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        el.classList.remove('intro-hidden');
      }, i * 120);
    });
  }, 800);
}, totalAnimTime + PAUSE);
</script>
